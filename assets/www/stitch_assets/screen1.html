<script>
        // Simple Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        
        themeToggle.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            const icon = themeToggle.querySelector('span');
            icon.innerText = htmlElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
        });

        // Simple checkbox toggle animation logic
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const row = this.closest('.item-row');
                const text = row.querySelector('.flex-1');
                if (this.checked) {
                    text.classList.add('line-through', 'text-on-surface-variant/40');
                    row.classList.add('opacity-60');
                } else {
                    text.classList.remove('line-through', 'text-on-surface-variant/40');
                    row.classList.remove('opacity-60');
                }
            });
        });

        // Simulate swipe actions (Mobile only placeholder logic)
        let touchstartX = 0;
        let touchendX = 0;

        document.querySelectorAll('.item-row').forEach(row => {
            row.addEventListener('touchstart', e => {
                touchstartX = e.changedTouches[0].screenX;
            }, false);

            row.addEventListener('touchend', e => {
                touchendX = e.changedTouches[0].screenX;
                handleSwipe(row);
            }, false);
        });

        function handleSwipe(row) {
            const diff = touchstartX - touchendX;
            if (diff > 50) { // Swipe Left (Delete)
                row.style.transform = 'translateX(-100%)';
                row.style.opacity = '0';
                setTimeout(() => row.remove(), 300);
            }
            if (diff < -50) { // Swipe Right (Complete)
                const cb = row.querySelector('input[type="checkbox"]');
                cb.checked = !cb.checked;
                cb.dispatchEvent(new Event('change'));
            }
        }
    </script>
